version: '3.8'

services:
  # React portal — production build served by Nginx
  react-app:
    build: .
    ports:
      - "8080:80"
    restart: unless-stopped

  # React portal — Vite dev server with hot module reload
  react-dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - react_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - NODE_ENV=development

  # Original static HTML analysis tool
  static-site:
    image: nginx:alpine
    volumes:
      - .:/usr/share/nginx/html:ro
      - ./docker/nginx-static.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8081:80"
    restart: unless-stopped

volumes:
  react_node_modules:
