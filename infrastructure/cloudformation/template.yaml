AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Address Summary Organizing Tool — Static Website Hosting on AWS GovCloud.
  Deploys an S3 bucket with website hosting, a CloudFront distribution with OAC,
  security response headers, and optional access logging.

# ──────────────────────────────────────────────────────────────
# Parameters
# ──────────────────────────────────────────────────────────────
Parameters:
  ProjectName:
    Type: String
    Default: address-tool
    Description: Short project name used in resource names (lowercase, hyphens only).
    AllowedPattern: ^[a-z0-9-]+$
    ConstraintDescription: Lowercase letters, numbers and hyphens only.

  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment label.

  BucketName:
    Type: String
    Default: ""
    Description: >
      S3 bucket name. Must be globally unique.
      If empty, a name is auto-generated from ProjectName and Environment.

  EnableCloudFront:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Create a CloudFront distribution in front of S3.

  CloudFrontPriceClass:
    Type: String
    Default: PriceClass_100
    AllowedValues: [PriceClass_All, PriceClass_200, PriceClass_100]
    Description: CloudFront price class. PriceClass_100 uses US/Europe edge nodes.

  CustomDomain:
    Type: String
    Default: ""
    Description: Optional custom domain name (e.g., address-tool.agency.gov).

  AcmCertificateArn:
    Type: String
    Default: ""
    Description: >
      ARN of an ACM certificate for the custom domain (must be in us-east-1).
      Required when CustomDomain is set.

  EnableAccessLogging:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Enable S3 server access logging.

  EnableVersioning:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Enable S3 bucket versioning.

  OwnerTag:
    Type: String
    Default: address-team
    Description: Team or individual responsible for this deployment.

# ──────────────────────────────────────────────────────────────
# Conditions
# ──────────────────────────────────────────────────────────────
Conditions:
  CreateCloudFront:      !Equals [!Ref EnableCloudFront, "true"]
  HasCustomDomain:       !Not [!Equals [!Ref CustomDomain, ""]]
  HasCustomBucketName:   !Not [!Equals [!Ref BucketName, ""]]
  EnableLogging:         !Equals [!Ref EnableAccessLogging, "true"]
  EnableBucketVersioning: !Equals [!Ref EnableVersioning, "true"]

# ──────────────────────────────────────────────────────────────
# Resources
# ──────────────────────────────────────────────────────────────
Resources:

  # ── Access Log Bucket ──────────────────────────────────────
  LogBucket:
    Type: AWS::S3::Bucket
    Condition: EnableLogging
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !If
        - HasCustomBucketName
        - !Sub "${BucketName}-logs"
        - !Sub "${ProjectName}-${Environment}-${AWS::AccountId}-logs"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Owner
          Value: !Ref OwnerTag

  # ── Site Bucket ────────────────────────────────────────────
  SiteBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !If
        - HasCustomBucketName
        - !Ref BucketName
        - !Sub "${ProjectName}-${Environment}-${AWS::AccountId}"
      VersioningConfiguration: !If
        - EnableBucketVersioning
        - Status: Enabled
        - Status: Suspended
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
            BucketKeyEnabled: true
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, HEAD]
            AllowedOrigins: ['*']
            MaxAge: 3000
      LoggingConfiguration: !If
        - EnableLogging
        - DestinationBucketName: !Ref LogBucket
          LogFilePrefix: s3-access-logs/
        - !Ref AWS::NoValue
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Owner
          Value: !Ref OwnerTag

  # ── CloudFront Origin Access Control ──────────────────────
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Condition: CreateCloudFront
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${ProjectName}-${Environment}-oac"
        Description: !Sub "OAC for ${ProjectName} ${Environment} static site"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ── CloudFront Response Headers Policy ────────────────────
  SecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Condition: CreateCloudFront
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "${ProjectName}-security-headers-${Environment}"
        SecurityHeadersConfig:
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 31536000
            IncludeSubdomains: true
            Preload: true
            Override: true
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          XSSProtection:
            ModeBlock: true
            Protection: true
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true

  # ── CloudFront Distribution ────────────────────────────────
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Condition: CreateCloudFront
    Properties:
      DistributionConfig:
        Comment: !Sub "Address Summary Organizing Tool — ${Environment}"
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: !Ref CloudFrontPriceClass
        Aliases: !If
          - HasCustomDomain
          - [!Ref CustomDomain]
          - !Ref AWS::NoValue
        Origins:
          - Id: !Sub "s3-${ProjectName}"
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: !Sub "s3-${ProjectName}"
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          DefaultTTL: 3600
          MaxTTL: 86400
          MinTTL: 0
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref AcmCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Logging: !If
          - EnableLogging
          - Bucket: !GetAtt LogBucket.DomainName
            Prefix: cloudfront-logs/
            IncludeCookies: false
          - !Ref AWS::NoValue
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Owner
          Value: !Ref OwnerTag

  # ── S3 Bucket Policy ───────────────────────────────────────
  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - !If
            - CreateCloudFront
            - Sid: AllowCloudFrontServicePrincipal
              Effect: Allow
              Principal:
                Service: cloudfront.amazonaws.com
              Action: s3:GetObject
              Resource: !Sub "${SiteBucket.Arn}/*"
              Condition:
                StringEquals:
                  AWS:SourceArn: !Sub "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"
            - !Ref AWS::NoValue
          - Sid: DenyNonHTTPS
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt SiteBucket.Arn
              - !Sub "${SiteBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: "false"

# ──────────────────────────────────────────────────────────────
# Outputs
# ──────────────────────────────────────────────────────────────
Outputs:
  BucketName:
    Description: S3 bucket name hosting the static site.
    Value: !Ref SiteBucket
    Export:
      Name: !Sub "${AWS::StackName}-BucketName"

  BucketArn:
    Description: ARN of the S3 bucket.
    Value: !GetAtt SiteBucket.Arn
    Export:
      Name: !Sub "${AWS::StackName}-BucketArn"

  CloudFrontDistributionId:
    Description: CloudFront distribution ID (needed for cache invalidation).
    Condition: CreateCloudFront
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub "${AWS::StackName}-CFDistributionId"

  CloudFrontDomainName:
    Description: CloudFront distribution domain name.
    Condition: CreateCloudFront
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub "${AWS::StackName}-CFDomainName"

  SiteURL:
    Description: Primary URL to access the deployed site.
    Value: !If
      - HasCustomDomain
      - !Sub "https://${CustomDomain}"
      - !If
        - CreateCloudFront
        - !Sub "https://${CloudFrontDistribution.DomainName}"
        - !Sub "http://${SiteBucket.WebsiteURL}"

  S3WebsiteEndpoint:
    Description: Direct S3 website endpoint (HTTP fallback, no CloudFront).
    Value: !Sub "http://${SiteBucket.WebsiteURL}"

  DeployCommand:
    Description: AWS CLI command to sync site files to S3.
    Value: !Sub "aws s3 sync ./ s3://${SiteBucket} --delete --exclude '.git/*' --exclude 'infrastructure/*' --exclude 'scripts/*' --region ${AWS::Region}"

  InvalidateCommand:
    Description: AWS CLI command to invalidate the CloudFront cache after deployment.
    Condition: CreateCloudFront
    Value: !Sub "aws cloudfront create-invalidation --distribution-id ${CloudFrontDistribution} --paths '/*'"
