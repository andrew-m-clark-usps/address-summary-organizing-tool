# =============================================================================
# deploy.yml — CI/CD Pipeline: Deploy to AWS GovCloud
#
# Deploys:
#   1. Static site (S3 + CloudFront) — index.html, verify.html, js/, css/
#   2. Lambda function               — infrastructure/lambda/verify-address/
#
# Triggers:
#   • Push to main    → prod
#   • Push to develop → staging
#   • Manual workflow_dispatch with environment selector
#
# Authentication:
#   OIDC federation — no long-lived AWS credentials stored in GitHub.
#   The IAM role is assumed via GitHub's OIDC provider.
#   Required secret: AWS_DEPLOY_ROLE_ARN_GOVCLOUD (IAM role ARN)
#
# Required GitHub Secrets:
#   AWS_DEPLOY_ROLE_ARN_GOVCLOUD   — IAM role ARN for OIDC assumption
#   S3_BUCKET_PROD                 — Production S3 bucket name
#   S3_BUCKET_STAGING              — Staging S3 bucket name
#   LAMBDA_FUNCTION_NAME_PROD      — Production Lambda function name
#   LAMBDA_FUNCTION_NAME_STAGING   — Staging Lambda function name
#   CLOUDFRONT_DIST_ID_PROD        — Production CloudFront distribution ID (optional)
#   CLOUDFRONT_DIST_ID_STAGING     — Staging CloudFront distribution ID (optional)
#
# Optional Secrets:
#   SLACK_WEBHOOK_URL              — Slack incoming webhook for deploy notifications
#
# IAM role permissions required (least-privilege):
#   s3:ListBucket, s3:GetObject, s3:PutObject, s3:DeleteObject
#   cloudfront:CreateInvalidation, cloudfront:GetDistribution
#   lambda:UpdateFunctionCode, lambda:GetFunction
#   sts:GetCallerIdentity
# =============================================================================

name: Deploy to AWS GovCloud

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - 'infrastructure/**'
      - 'scripts/**'
      - '**.md'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - prod
      invalidate_cache:
        description: 'Invalidate CloudFront cache after deploy'
        required: false
        default: true
        type: boolean

# Cancel any in-progress deployment to the same branch
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_DEFAULT_REGION: us-gov-west-1
  # Site directories/files to exclude from S3 sync
  S3_EXCLUDE: >-
    --exclude ".git/*"
    --exclude ".github/*"
    --exclude "infrastructure/*"
    --exclude "scripts/*"
    --exclude "*.sh"
    --exclude "*.ps1"
    --exclude "*.tf"
    --exclude "*.tfvars"
    --exclude "*.tfstate"
    --exclude ".terraform/*"
    --exclude "*.md"
    --exclude "node_modules/*"

jobs:
  # ── Determine environment ──────────────────────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      environment:   ${{ steps.env.outputs.environment }}
      bucket:        ${{ steps.env.outputs.bucket }}
      distribution:  ${{ steps.env.outputs.distribution }}
      site_url:      ${{ steps.env.outputs.site_url }}
    steps:
      - name: Determine target environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            ENV="prod"
          else
            ENV="staging"
          fi
          echo "environment=$ENV" >> "$GITHUB_OUTPUT"

          if [[ "$ENV" == "prod" ]]; then
            echo "bucket=${{ secrets.S3_BUCKET_PROD }}"             >> "$GITHUB_OUTPUT"
            echo "distribution=${{ secrets.CLOUDFRONT_DIST_ID_PROD }}" >> "$GITHUB_OUTPUT"
          else
            echo "bucket=${{ secrets.S3_BUCKET_STAGING }}"             >> "$GITHUB_OUTPUT"
            echo "distribution=${{ secrets.CLOUDFRONT_DIST_ID_STAGING }}" >> "$GITHUB_OUTPUT"
          fi

  # ── Deploy ────────────────────────────────────────────────
  deploy:
    name: Deploy (${{ needs.setup.outputs.environment }})
    runs-on: ubuntu-latest
    needs: setup
    environment: ${{ needs.setup.outputs.environment }}
    permissions:
      contents:    read
      id-token:    write    # Required for OIDC authentication

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (GovCloud — OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_DEPLOY_ROLE_ARN_GOVCLOUD }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region:        ${{ env.AWS_DEFAULT_REGION }}

      - name: Verify AWS identity
        run: |
          aws sts get-caller-identity
          echo "Deploying to bucket: ${{ needs.setup.outputs.bucket }}"

      - name: Validate bucket exists
        run: |
          BUCKET="${{ needs.setup.outputs.bucket }}"
          if [[ -z "$BUCKET" ]]; then
            echo "::error::S3 bucket name secret is not set for ${{ needs.setup.outputs.environment }}."
            exit 1
          fi
          aws s3 ls "s3://$BUCKET" > /dev/null 2>&1 || {
            echo "::error::Bucket s3://$BUCKET not found or not accessible."
            exit 1
          }

      - name: Sync site files to S3
        run: |
          BUCKET="${{ needs.setup.outputs.bucket }}"
          aws s3 sync ./ "s3://$BUCKET/" \
            --delete \
            --region "$AWS_DEFAULT_REGION" \
            --cache-control "max-age=3600" \
            --metadata-directive REPLACE \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "infrastructure/*" \
            --exclude "scripts/*" \
            --exclude "*.sh" \
            --exclude "*.ps1" \
            --exclude "*.tf" \
            --exclude "*.tfvars" \
            --exclude "*.tfstate" \
            --exclude ".terraform/*" \
            --exclude "*.md" \
            --exclude "node_modules/*"

      - name: Set immutable cache on CSS/JS assets
        run: |
          BUCKET="${{ needs.setup.outputs.bucket }}"
          # CSS assets — long cache
          aws s3 cp "s3://$BUCKET/css/" "s3://$BUCKET/css/" \
            --recursive \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=31536000, immutable" \
            --region "$AWS_DEFAULT_REGION" || true

          # JS assets — long cache
          aws s3 cp "s3://$BUCKET/js/" "s3://$BUCKET/js/" \
            --recursive \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=31536000, immutable" \
            --region "$AWS_DEFAULT_REGION" || true

          # index.html — never cache
          aws s3 cp "s3://$BUCKET/index.html" "s3://$BUCKET/index.html" \
            --metadata-directive REPLACE \
            --cache-control "no-cache, no-store, must-revalidate" \
            --region "$AWS_DEFAULT_REGION" || true

      - name: Invalidate CloudFront cache
        if: >
          needs.setup.outputs.distribution != '' &&
          (github.event.inputs.invalidate_cache != 'false')
        run: |
          DIST_ID="${{ needs.setup.outputs.distribution }}"
          echo "Creating CloudFront invalidation for distribution: $DIST_ID"
          RESULT=$(aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*" \
            --region "$AWS_DEFAULT_REGION" 2>&1)
          echo "$RESULT"
          INV_ID=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['Invalidation']['Id'])" 2>/dev/null || echo "unknown")
          echo "Invalidation ID: $INV_ID"

      - name: Deployment summary
        run: |
          echo "## ✅ Deployment Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | ${{ needs.setup.outputs.environment }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| S3 Bucket | ${{ needs.setup.outputs.bucket }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Region | ${{ env.AWS_DEFAULT_REGION }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | ${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"

  # ── Deploy Lambda function ─────────────────────────────────
  deploy-lambda:
    name: Deploy Lambda (${{ needs.setup.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [setup, deploy]
    environment: ${{ needs.setup.outputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infrastructure/lambda/verify-address/package.json

      - name: Configure AWS credentials (GovCloud — OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_DEPLOY_ROLE_ARN_GOVCLOUD }}
          role-session-name: GitHubActions-Lambda-${{ github.run_id }}
          aws-region:        ${{ env.AWS_DEFAULT_REGION }}

      - name: Install Lambda dependencies
        working-directory: infrastructure/lambda/verify-address
        run: npm ci --omit=dev

      - name: Package Lambda
        working-directory: infrastructure/lambda/verify-address
        run: |
          zip -r ../../../lambda.zip . \
            --exclude "*.test.*" \
            --exclude "*/__tests__/*" \
            --exclude "*.md"
          echo "Lambda package size: $(du -sh ../../../lambda.zip | cut -f1)"

      - name: Determine Lambda function name
        id: lambda
        run: |
          ENV="${{ needs.setup.outputs.environment }}"
          if [[ "$ENV" == "prod" ]]; then
            echo "function_name=${{ secrets.LAMBDA_FUNCTION_NAME_PROD }}" >> "$GITHUB_OUTPUT"
          else
            echo "function_name=${{ secrets.LAMBDA_FUNCTION_NAME_STAGING }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Lambda function
        run: |
          FN="${{ steps.lambda.outputs.function_name }}"
          if [[ -z "$FN" ]]; then
            echo "::warning::LAMBDA_FUNCTION_NAME secret not set for ${{ needs.setup.outputs.environment }} — skipping Lambda deploy."
            exit 0
          fi
          echo "Deploying Lambda: $FN"
          aws lambda update-function-code \
            --function-name "$FN" \
            --zip-file fileb://lambda.zip \
            --region "$AWS_DEFAULT_REGION"
          # Wait for update to complete
          aws lambda wait function-updated \
            --function-name "$FN" \
            --region "$AWS_DEFAULT_REGION"
          echo "Lambda deploy complete."

      - name: Lambda deploy summary
        run: |
          FN="${{ steps.lambda.outputs.function_name }}"
          echo "## ✅ Lambda Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Function | $FN |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | ${{ needs.setup.outputs.environment }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Region | ${{ env.AWS_DEFAULT_REGION }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | ${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"

  # ── Notify (optional Slack) ───────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [setup, deploy]
    if: always() && secrets.SLACK_WEBHOOK_URL != ''
    permissions: {}
    steps:
      - name: Slack notification
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ needs.deploy.result == 'success' && '✅' || '❌' }} Address Tool deploy to *${{ needs.setup.outputs.environment }}* ${{ needs.deploy.result }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ needs.deploy.result == 'success' && '✅' || '❌' }} *Address Summary Organizing Tool* — Deploy to `${{ needs.setup.outputs.environment }}`\n*Status:* ${{ needs.deploy.result }}\n*Commit:* `${{ github.sha }}`\n*By:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
